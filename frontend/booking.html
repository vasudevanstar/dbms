<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking - FastRide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-car-front-fill" style="color: var(--accent-color);"></i> FastRide
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="vehicles.html">Vehicles</a></li>
        <li class="nav-item"><a class="nav-link" href="history.html">History</a></li>
        <li class="nav-item"><a class="nav-link btn-login" href="login.html">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-4 fade-in-scroll visible">
  <div class="form-section position-relative">
    <div class="text-center mb-4">
      <i class="bi bi-calendar-check text-accent fs-1 mb-2" style="color: var(--accent-color);"></i>
      <h3 style="font-weight: 700; color: var(--primary-color);">Complete Your Booking</h3>
      <p class="text-muted small">Reserve your car quickly and securely.</p>
    </div>
    
    <div id="message" class="alert-container"></div>
    
    <form id="bookingForm" class="needs-validation">
      <div class="mb-3">
        <label class="form-label fw-bold"><i class="bi bi-car-front p-1"></i> Vehicle ID</label>
        <input type="number" id="vehicleId" class="form-control bg-light" required readonly>
      </div>
      
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold"><i class="bi bi-calendar-event p-1"></i> Start Date</label>
          <input type="date" id="startDate" class="form-control hover-shadow transition" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold"><i class="bi bi-calendar-x p-1"></i> End Date</label>
          <input type="date" id="endDate" class="form-control hover-shadow transition" required>
        </div>
      </div>
      
      <div class="mb-4 d-flex align-items-center bg-light p-3 rounded">
        <strong>Availability:</strong> 
        <span id="availabilityBadge" class="badge bg-secondary ms-2" style="font-size: 0.9rem;">Select dates to check</span>
      </div>
      
      <div class="mb-4">
        <label class="form-label fw-bold"><i class="bi bi-credit-card p-1"></i> Payment Method</label>
        <select id="method" class="form-select" required>
          <option value="Credit Card">Credit Card</option>
          <option value="Debit Card">Debit Card</option>
          <option value="Cash">Cash (Pay at counter)</option>
        </select>
      </div>
      
      <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold" style="font-size: 1.1rem;">
        Confirm Booking <i class="bi bi-check-circle ms-1"></i>
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
