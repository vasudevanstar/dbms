<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - FastRide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-car-front-fill" style="color: var(--accent-color);"></i> FastRide
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="vehicles.html">Vehicles</a></li>
        <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-4 fade-in-scroll visible">
  <div class="form-section">
    <div class="text-center mb-4">
      <i class="bi bi-person-circle fs-1" style="color: var(--primary-color);"></i>
      <h3>Welcome Back</h3>
      <p class="text-muted">Login to manage your bookings and account.</p>
    </div>
    
    <div id="message" class="alert-container"></div>
    
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-envelope"></i> Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label"><i class="bi bi-lock"></i> Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">Login <i class="bi bi-box-arrow-in-right"></i></button>
      
      <div class="text-center mt-4">
        <span class="text-muted">Don't have an account? </span>
        <a href="register.html" class="text-decoration-none fw-bold" style="color: var(--accent-color);">Create one</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
