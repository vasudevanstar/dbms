<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - FastRide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background-color: #f8f9fa;">

<nav class="navbar navbar-expand-lg fixed-top bg-white shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-car-front-fill" style="color: var(--accent-color);"></i> FastRide <span class="badge bg-danger ms-1" style="font-size: 0.6rem; vertical-align: super;">ADMIN</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto text-center">
        <!-- Optional centrally placed nav links -->
      </ul>
      <ul class="navbar-nav align-items-center">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house"></i> Home</a></li>
        <li class="nav-item"><a class="nav-link" href="vehicles.html"><i class="bi bi-car-front"></i> Vehicles</a></li>
        <li class="nav-item"><a class="nav-link text-danger" href="login.html" onclick="localStorage.removeItem('token')"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid mt-5 pt-4 fade-in-scroll visible px-4">
  <div id="message" class="alert-container"></div>
  
  <div class="row g-4">
    <!-- Sidebar / Add Vehicle Form -->
    <div class="col-lg-3">
      <div class="sidebar position-sticky" style="top: 90px;">
        <h5 class="fw-bold mb-4" style="color: var(--primary-color);"><i class="bi bi-plus-circle me-2 text-accent"></i> Manage Vehicle</h5>
        <hr class="text-muted">
        <form id="vehicleForm">
          <input type="hidden" id="vehicleId">
          <div class="mb-3">
            <label class="form-label small fw-bold">Vehicle Name/Model</label>
            <input type="text" id="vehicleName" class="form-control form-control-sm" placeholder="e.g. Toyota Camry" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Type</label>
            <input type="text" id="vehicleType" class="form-control form-control-sm" placeholder="Sedan, SUV..." required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Rent Per Day ($)</label>
            <input type="number" id="vehicleRent" class="form-control form-control-sm" placeholder="50" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Status</label>
            <select id="vehicleStatus" class="form-select form-select-sm" required>
              <option value="Available">Available</option>
              <option value="Booked">Booked</option>
              <option value="Maintenance">Maintenance</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label small fw-bold">Image URL</label>
            <input type="url" id="vehicleImage" class="form-control form-control-sm" placeholder="https://...">
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success btn-sm fw-bold"><i class="bi bi-save me-1"></i> Save Vehicle</button>
            <button type="button" id="resetBtn" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-counterclockwise me-1"></i> Reset</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="col-lg-9">
      <!-- Top Row: Analytics Cards -->
      <div class="row g-3 mb-4" id="analyticsCards">
        <!-- Rendered via JS -->
      </div>

      <!-- Maintenance Alerts -->
      <div class="row mb-4" id="maintenanceAlertsSection" style="display: none;">
        <div class="col-12">
          <div class="alert alert-danger shadow-sm border-0 border-start border-danger border-4 alert-dismissible fade show">
            <h5 class="alert-heading fw-bold mb-2"><i class="bi bi-exclamation-triangle-fill"></i> Maintenance Required</h5>
            <ul id="maintenanceList" class="mb-0 small ps-3"></ul>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        </div>
      </div>

      <!-- Revenue Chart & Database split -->
      <div class="row g-4 mb-4">
        <!-- Chart -->
        <div class="col-xl-6">
          <div class="card border-0 shadow-sm h-100 rounded-4">
            <div class="card-header bg-white border-0 pt-4 pb-0">
              <h6 class="fw-bold" style="color: var(--primary-color);">Monthly Revenue Overview</h6>
            </div>
            <div class="card-body">
              <div style="position: relative; height: 100%; min-height: 300px;">
                <canvas id="revenueChart"></canvas>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Vehicles List -->
        <div class="col-xl-6">
          <div class="card border-0 shadow-sm h-100 rounded-4">
            <div class="card-header bg-white border-0 pt-4 pb-0 d-flex justify-content-between align-items-center">
              <h6 class="fw-bold mb-0" style="color: var(--primary-color);">Fleet Portfolio</h6>
              <span class="badge bg-primary rounded-pill">Manage</span>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive px-3 mt-3" style="max-height: 300px; overflow-y: auto;">
                <div id="vehicleTable"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bookings Table -->
      <div class="row">
        <div class="col-12">
          <div class="card border-0 shadow-sm rounded-4 mb-5">
            <div class="card-header bg-white border-0 pt-4 pb-0">
              <h6 class="fw-bold" style="color: var(--primary-color);"><i class="bi bi-journal-text me-2 text-primary"></i> Master Bookings Log</h6>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive px-3 pb-3 mt-3" id="bookingTable"></div>
            </div>
          </div>
        </div>
      </div>
      
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
