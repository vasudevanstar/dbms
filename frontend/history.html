<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental History - FastRide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-car-front-fill" style="color: var(--accent-color);"></i> FastRide
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="vehicles.html">Vehicles</a></li>
        <li class="nav-item"><a class="nav-link btn-login" href="login.html">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-4 fade-in-scroll visible">
  <h3 class="mb-4 text-center" style="font-weight: 700; color: var(--primary-color);">My Rental History</h3>
  
  <div class="form-section mb-5" style="max-width: 500px;">
    <form id="historyForm">
      <div class="input-group">
        <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
        <input type="email" id="historyEmail" class="form-control border-start-0 ps-0" placeholder="Enter your registered email" required>
        <button type="submit" class="btn btn-primary px-4"><i class="bi bi-search"></i> View History</button>
      </div>
    </form>
  </div>

  <div id="message" class="alert-container"></div>
  
  <div class="bg-white p-4 rounded-4 shadow-sm">
    <div id="historyList">
      <div class="text-center text-muted p-5">
        <i class="bi bi-clock-history fs-1 mb-3 d-block"></i>
        <p>Enter your email above to fetch your past and current rental history.</p>
      </div>
    </div>
  </div>
</div>

<!-- Rating Modal -->
<div class="modal fade" id="ratingModal" tabindex="-1" aria-labelledby="ratingModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header bg-light border-0">
        <h5 class="modal-title" id="ratingModalLabel"><i class="bi bi-star-fill text-warning me-2"></i> Rate Your Experience</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <form id="ratingForm">
          <input type="hidden" id="rateRentalId">
          <input type="hidden" id="rateVehicleId">
          <div class="mb-3">
            <label class="form-label fw-bold">Rating (Stars)</label>
            <select id="rateStars" class="form-select">
              <option value="5">⭐⭐⭐⭐⭐ 5 - Excellent</option>
              <option value="4">⭐⭐⭐⭐ 4 - Very Good</option>
              <option value="3">⭐⭐⭐ 3 - Average</option>
              <option value="2">⭐⭐ 2 - Poor</option>
              <option value="1">⭐ 1 - Terrible</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Review / Feedback</label>
            <textarea id="rateReview" class="form-control" rows="3" placeholder="Tell us about the vehicle condition, service, etc."></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">Submit Review</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
