<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment - FastRide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-car-front-fill" style="color: var(--accent-color);"></i> FastRide
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="vehicles.html">Vehicles</a></li>
        <li class="nav-item"><a class="nav-link" href="history.html">History</a></li>
        <li class="nav-item"><a class="nav-link btn-login" href="login.html">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-4 fade-in-scroll visible">
  <div class="form-section">
    <div class="text-center mb-4">
      <i class="bi bi-credit-card-2-front fs-1 text-success mb-2 d-inline-block"></i>
      <h3 style="font-weight: 700; color: var(--primary-color);">Secure Payment</h3>
      <p class="text-muted">Complete your transaction to confirm your booking.</p>
    </div>
    
    <div id="message" class="alert-container"></div>
    
    <form id="paymentForm">
      <div class="mb-3">
        <label class="form-label text-muted"><i class="bi bi-receipt"></i> Rental ID</label>
        <input type="number" id="rentalId" class="form-control bg-light" required readonly>
      </div>
      <div class="mb-3">
        <label class="form-label text-muted"><i class="bi bi-currency-dollar"></i> Total Amount Due</label>
        <div class="input-group">
          <span class="input-group-text bg-light">$</span>
          <input type="number" id="amount" class="form-control bg-light fw-bold text-success fs-5" required readonly step="0.01">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label"><i class="bi bi-wallet2"></i> Payment Method</label>
        <select id="method" class="form-select" required>
          <option value="Credit Card" selected>💳 Credit Card</option>
          <option value="Debit Card">💳 Debit Card</option>
          <option value="Cash">💵 Cash</option>
        </select>
      </div>
      <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold">Pay Securely <i class="bi bi-lock-fill ms-1"></i></button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
